<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ІС Житлове агентство</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="role-owner" id="bodyElement">

    <header id="mainHeader">
        <h1 id="headerTitle">ІС Житлове агентство: Кабінет Власника</h1>
        <div class="role-selector">
            <label for="roleSelect">Ваша роль:</label>
            <select id="roleSelect">
                <option value="owner">Власник житла</option>
                <option value="tenant">Орендар</option>
                <option value="realtor">Рієлтор</option>
            </select>
        </div>
    </header>

    <nav id="mainNav">
        <!-- Кнопки Власника -->
        <button class="nav-btn nav-owner active" data-target="OwnerProperties">Мої об'єкти</button>
        <button class="nav-btn nav-owner" data-target="OwnerAddProperty">Додати об'єкт</button>
        
        <!-- Кнопки Орендара -->
        <button class="nav-btn nav-tenant" data-target="TenantCatalog">Каталог житла</button>
        <button class="nav-btn nav-tenant" data-target="TenantRequests">Мої заявки</button>
        
        <!-- Кнопки Рієлтора -->
        <button class="nav-btn nav-realtor" data-target="RealtorInspections">Заплановані огляди</button>
        <button class="nav-btn nav-realtor" data-target="RealtorContracts">Укладання договорів</button>
    </nav>

    <div class="container">
        <!-- ================= ВЛАСНИК ================= -->
        <div id="OwnerProperties" class="tab-content active role-view-owner">
            <h2>Список моїх об'єктів</h2>
            <div id="ownerPropertiesList"></div>
            
            <h2 style="margin-top: 40px;">Запити від орендарів на мої об'єкти</h2>
            <div id="ownerRequestsList"></div>
        </div>

        <div id="OwnerAddProperty" class="tab-content role-view-owner">
            <h2>Додати нове житло</h2>
            <form id="addPropertyForm">
                <div class="form-group">
                    <label>Адреса:</label>
                    <input type="text" id="propAddress" required placeholder="м. Київ, вул. Хрещатик, 1">
                </div>
                <div class="form-group">
                    <label>Кількість кімнат:</label>
                    <input type="number" id="propRooms" required min="1" placeholder="2">
                </div>
                <div class="form-group">
                    <label>Ціна оренди (грн/міс):</label>
                    <input type="number" id="propPrice" required min="1000" placeholder="15000">
                </div>
                <button type="submit" class="btn btn-success">Опублікувати оголошення</button>
            </form>
        </div>

        <!-- ================= ОРЕНДАР ================= -->
        <div id="TenantCatalog" class="tab-content role-view-tenant">
            <h2>Доступне житло для оренди</h2>
            <div id="tenantCatalogList"></div>
        </div>

        <div id="TenantRequests" class="tab-content role-view-tenant">
            <h2>Мої заявки на перегляд</h2>
            <div id="tenantRequestsList"></div>
        </div>

        <!-- ================= РІЄЛТОР ================= -->
        <div id="RealtorInspections" class="tab-content role-view-realtor">
            <h2>Огляди житла (Нові заявки)</h2>
            <div id="realtorInspectionsList"></div>
        </div>

        <div id="RealtorContracts" class="tab-content role-view-realtor">
            <h2>Оформлення договорів (Оглянуті об'єкти)</h2>
            <div id="realtorContractsList"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
